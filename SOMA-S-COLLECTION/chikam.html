    <meta charset="UTF-8">

    <title>Creating structure</title>
    <style>
        body{
            background-image: url(pinkii.jpg);
        }
        * {
            margin: 0;
        }

        .kamsi {
            padding: 5cm;
        }

        nav {
             background-color:#EDA0A8 ;
            display: inline-flex;           
           align-content: space-between;
            gap: 15cm;
            width: 100%;
        }
        
     logo{
         padding: 20cm;

      }

        ul {
            display: inline-flex;
            list-style: none;
        }

        header {
            background-image: url(beautiful-mountains-landscape.jpg);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }


        ul li a {
            text-decoration: none;
            color: antiquewhite;
            padding: 2mm;
            font-size: 5mm;
        }

        button {
            background: #E4929E;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: inset;
           }

        button:hover {
           background-color: #f5c4e0;
           transform: scale(1.05);
           animation: 0.3s ease;
        }
        @keyframes move{
             0%{left:0;}
            100%{left:100;}
        }

        button:active {
            background-color: rgb(248, 30, 67);
        }

        button a {
            text-decoration: none;
            text-overflow: clip;

        }

        a:link {
            color: black;
        }

        a:visited {
            color: aqua;
        }
        
        @media(max-width:500px){
            body{
                background-image: url(purple\ comp.jpg);
                }
            }
    </style>
</head>
